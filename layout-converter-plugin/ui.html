<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Qwen Layout Converter</title>
    <style>
      body {
        font-family: Inter, system-ui, sans-serif;
        margin: 0;
        padding: 16px;
        color: #111;
      }

      .row {
        margin-bottom: 12px;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      input, select, button, textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        font-size: 13px;
      }

      textarea {
        resize: none;
        min-height: 78px;
        font-family: Inter, system-ui, sans-serif;
      }

      button {
        background: #18a0fb;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: #0d8ae6;
      }

      #status {
        font-size: 12px;
        color: #555;
        min-height: 24px;
        white-space: pre-wrap;
      }

      .readonly {
        background: #f7f7f7;
        color: #333;
      }

      .zone-result {
        min-height: 120px;
        white-space: pre-wrap;
        font-size: 12px;
        line-height: 1.45;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #e5e5e5;
      }

      #classify-zone-btn:hover {
        background: #6d28d9;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <label for="selected-frame">Selected Figma Design</label>
      <textarea id="selected-frame" class="readonly" readonly>No frame selected.</textarea>
    </div>

    <div class="row">
      <label for="backend-url">Backend URL</label>
      <input id="backend-url" value="http://localhost:3037" />
    </div>

    <div class="row">
      <label for="target-preset">Target Size</label>
      <select id="target-preset">
        <option value="same">Same size</option>
        <option value="1080x1920">1080 × 1920</option>
        <option value="1920x1080">1920 × 1080</option>
        <option value="1200x628">1200 × 628</option>
        <option value="1080x1080">1080 × 1080</option>
      </select>
    </div>

    <div class="row">
      <label for="convert-mode">Conversion Mode</label>
      <select id="convert-mode">
        <option value="apply_to_clone_fast">Fast (heuristics only)</option>
        <option value="apply_to_clone_vlm">VLM Scene Only (better semantics)</option>
        <option value="full_layout_debug">Full Layout Debug</option>
      </select>
    </div>

    <div class="row">
      <button id="convert-btn">Convert Selected Frame</button>
    </div>

    <div class="row">
      <button id="classify-zone-btn" type="button" style="background: #7c3aed">
        Classify Zone (v2 test)
      </button>
    </div>

    <div class="row">
      <label>Zone classification (Qwen v2)</label>
      <div id="zone-result" class="zone-result readonly">
        Run “Classify Zone” on one selected frame (JSON to /api/v2/classify-zone-json). No clone, no /api/convert.
      </div>
    </div>

    <div id="status"></div>

    <script>
      const statusEl = document.getElementById("status");
      const convertBtn = document.getElementById("convert-btn");
      const classifyZoneBtn = document.getElementById("classify-zone-btn");
      const zoneResultEl = document.getElementById("zone-result");
      const selectedFrameEl = document.getElementById("selected-frame");

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function setSelectedFrameInfo(info) {
        if (!info || !info.hasSelection) {
          selectedFrameEl.value = "No frame selected.";
          return;
        }

        if (!info.isFrame) {
          selectedFrameEl.value =
            `Selected node is not a frame.\nName: ${info.name}\nType: ${info.type}`;
          return;
        }

        selectedFrameEl.value =
          `Name: ${info.name}\n` +
          `Type: ${info.type}\n` +
          `ID: ${info.id}\n` +
          `Size: ${info.width} × ${info.height}`;
      }

      function setZoneResult(text) {
        zoneResultEl.textContent = text;
      }

      convertBtn.onclick = () => {
        const backendUrl = document.getElementById("backend-url").value.trim();
        const targetPreset = document.getElementById("target-preset").value;
        const convertMode = document.getElementById("convert-mode").value;

        setStatus("Preparing request...");

        parent.postMessage(
          {
            pluginMessage: {
              type: "convert-selected-frame",
              backendUrl,
              targetPreset,
              convertMode
            }
          },
          "*"
        );
      };

      classifyZoneBtn.onclick = () => {
        const backendUrl = document.getElementById("backend-url").value.trim();
        setStatus("Classify zone: exporting frame…");
        setZoneResult("…");
        parent.postMessage(
          {
            pluginMessage: {
              type: "classify-zone-selected-frame",
              backendUrl
            }
          },
          "*"
        );
      };

      window.onmessage = (event) => {
        const msg = event.data.pluginMessage;
        if (!msg) return;

        if (msg.type === "status") {
          setStatus(msg.message);
        } else if (msg.type === "error") {
          setStatus("Error: " + msg.message);
        } else if (msg.type === "done") {
          setStatus("Done.");
        } else if (msg.type === "selection-info") {
          setSelectedFrameInfo(msg.selection);
        } else if (msg.type === "zone-classify-result") {
          if (!msg.ok || !msg.result) {
            setZoneResult("Classification failed. See status above.");
            return;
          }
          const r = msg.result;
          setZoneResult(
            `zone_type: ${r.zone_type}\n` +
              `confidence: ${Number(r.confidence).toFixed(4)}\n` +
              `orientation: ${r.orientation != null ? r.orientation : "—"}\n` +
              `reason:\n${r.reason != null ? r.reason : "—"}\n` +
              (r.run_id ? `\nrun_id: ${r.run_id}` : "") +
              (r.debug && typeof r.debug === "object"
                ? `\n\ndebug: qwen_call_count=${r.debug.qwen_call_count} elapsed_seconds=${r.debug.elapsed_seconds}`
                : "")
          );
        }
      };
    </script>
  </body>
</html>
